<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(-45deg, #0f172a, #1e293b, #020617);
    color: white;
}

/* Navbar */
header {
    position: sticky;
    top: 0;
    display: flex;
    justify-content: space-between;
    padding: 15px 8%;
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.4);
    z-index: 1000;
}

header h1 {
    color: #38bdf8;
}

nav {
    display: flex;
}

nav a {
    margin-left: 20px;
    text-decoration: none;
    color: white;
    position: relative;
}

nav a::after {
    content: "";
    width: 0%;
    height: 2px;
    background: #38bdf8;
    position: absolute;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

/* 🔥 Mobile Toggle */
.menu-toggle {
    display: none;
    font-size: 28px;
    cursor: pointer;
}

/* Title */
.title {
    text-align: center;
    padding: 60px 20px 20px;
}

.title h2 {
    font-size: 40px;
}

.title span {
    color: #38bdf8;
}

/* Layout */
.contact-wrapper {
    display: flex;
    gap: 40px;
    padding: 40px 8%;
}

/* Form */
form {
    flex: 1;
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: #0f172a;
    color: white;
}

textarea {
    height: 120px;
    resize: none;
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: #38bdf8;
    border: none;
    border-radius: 25px;
    color: black;
    cursor: pointer;
}

button:hover {
    background: white;
}

/* Contact Info */
.contact-info {
    flex: 1;
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
}

.contact-info h3 {
    color: #38bdf8;
    margin-bottom: 15px;
}

.contact-info p {
    margin: 10px 0;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
    margin-top: 40px;
}

/* Responsive */
@media(max-width: 768px) {

    .menu-toggle {
        display: block;
    }

    nav {
        position: absolute;
        top: 70px;
        right: 0;
        background: #020617;
        width: 100%;
        display: none;
        flex-direction: column;
        text-align: center;
    }

    nav a {
        margin: 15px 0;
    }

    nav.active {
        display: flex;
    }

    .contact-wrapper {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<!-- Navbar -->
<header>
    <h1>Sindhu</h1>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <nav id="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="skills.html">Skills</a>
        <a href="projects.html">Projects</a>
        <a href="experience.html">Experience</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<!-- Title -->
<div class="title">
    <h2>Contact <span>Me</span></h2>
</div>

<!-- Contact Section -->
<div class="contact-wrapper">

    <!-- Form -->
    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>

    <!-- Contact Details -->
    <div class="contact-info">
        <h3>Get in Touch</h3>
        <p><strong>Email:</strong> sindhushreeshetty015@gmail.com</p>
        <p><strong>Phone:</strong> +91 8296229231</p>
        <p><strong>Location:</strong> Udupi Karnataka, India</p>
    </div>

</div>

<!-- Footer -->
<footer>
    <p>© 2026 Sindhushree Shetty</p>
</footer>

<script>
function toggleMenu() {
    document.getElementById("nav-links").classList.toggle("active");
}
</script>

</body>
</html>
